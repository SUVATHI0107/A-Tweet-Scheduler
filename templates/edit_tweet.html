<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Tweet</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #83a4d4, #b6fbff);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background-color: white;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 500;
            color: #4a90e2;
            margin-bottom: 20px;
        }

        .tweet-area textarea {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
            resize: none;
            margin-bottom: 15px;
            box-shadow: inset 0px 2px 4px rgba(0, 0, 0, 0.05);
        }

        .tweet-area input[type="file"] {
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            background-color: #f9f9f9;
            width: 100%;
        }

        .tweet-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tweet-actions button,
        .tweet-actions .button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            color: white;
        }

        .tweet-actions button {
            background-color: #4a90e2;
        }

        .tweet-actions button:hover {
            background-color: #357ABD;
        }

        .tweet-actions .button {
            background-color: #e74c3c;
        }

        .tweet-actions .button:hover {
            background-color: #c0392b;
        }

        footer p {
            font-size: 14px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Edit Tweet</h1>
    </header>

    <div class="container">
        <form method="POST" enctype="multipart/form-data">
            <div class="tweet-area">
                <textarea name="tweet_text" rows="4" placeholder="Enter tweet text">{{ tweet['text'] }}</textarea>
                <input type="file" name="image" accept="image/*">
            </div>
            <div class="tweet-actions">
                <button type="submit">Save Changes</button>
                <a href="{{ url_for('schedule_page') }}" class="button">Cancel</a>
            </div>
        </form>
    </div>

    <footer>
        <p>Automated Tweet Scheduler</p>
    </footer>
</body>
</html>
