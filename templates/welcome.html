<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Your Tweet Scheduler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Welcome, {{ username }}!</h1>
        <p>You are now logged in to your Tweet Scheduler application.</p>

        <h2>Your Options:</h2>
        <ul>
            <li><a href="{{ url_for('poster') }}">Go to Tweet Scheduler</a></li>
            <li><a href="{{ url_for('options') }}">View Other Options</a></li>
            <li><a href="{{ url_for('index') }}">Log Out</a></li>
        </ul>

        {% if flash_messages %}
            {% for message in flash_messages %}
                <div class="flash-message">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
